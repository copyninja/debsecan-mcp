[tox]
envlist = py313
isolated_build = true

[testenv]
package = wheel
wheel_build_env = .venv
deps =
    pytest>=8.0.0
    pytest-asyncio>=0.23.0
    pytest-mock>=3.12.0
    pytest-cov>=5.0.0
    httpx>=0.27.0
setenv =
    DEBSECAN_SUITE = bookworm
commands =
    pytest {posargs:tests/} --cov=src/debsecan_mcp --cov-report=term-missing --cov-report=html --cov-report=xml

[testenv:lint]
deps =
    ruff>=0.15.4
commands =
    ruff check src/

[testenv:format]
deps =
    ruff>=0.15.4
commands =
    ruff format src/

[testenv:typing]
deps =
    mypy>=1.0.0
commands =
    mypy src/
